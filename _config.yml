title: Ignacio Garrón
author: Ignacio Garrón
email: ignacio.garron@uc3m.es
remote_theme: aterenin/minima-reboot
description: >


plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-feed
  - jekyll-redirect-from

minima_reboot:
  date_format: "%b %-d, %Y"
  date_format_short: "%b %-d"

header_pages:
- About.md
- posts.md
#- CV.md
- research.md
- teaching.md
#- github.md

footer_icons:
- username: IgnacioGarron
  url: https://github.com/IgnacioGarron
  icon: icon-github.svg

paginate: 5

markdown: kramdown

exclude:
  - Gemfile
  - Gemfile.lock
  - minima-reboot.gemspec
